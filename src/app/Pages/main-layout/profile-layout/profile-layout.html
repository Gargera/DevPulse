<div class="profile-container">
  
  <div class="profile-header-card glass-card">
    <div class="user-meta-zone">
      <div class="profile-avatar">
        {{ username.charAt(0).toUpperCase() }}
      </div>
      <div class="profile-details">
        <h2>{{ fullName }}</h2>
        <span class="user-tag">&#64;{{ username }}</span>
        <span class="profile-badge" [class.admin-badge]="roleName.includes('Admin')">
          <i class="bi" [class.bi-shield-lock-fill]="roleName.includes('Admin')" [class.bi-person-fill]="roleName.includes('User')"></i>
          {{ roleName }} Member
        </span>
      </div>
    </div>
  </div>

  <div class="profile-tabs-nav">
    <button 
      class="tab-btn" 
      [class.active]="activeTab === 'blogs'" 
      (click)="switchTab('blogs')"
    >
      <i class="bi bi-journal-text"></i> My Published Blogs
    </button>
    <button 
      class="tab-btn" 
      [class.active]="activeTab === 'settings'" 
      (click)="switchTab('settings')"
    >
      <i class="bi bi-gear-fill"></i> Account Settings
    </button>
  </div>

  <div class="tab-content-wrapper">
    
    @if (activeTab === 'blogs') {
      <div class="fade-in-tab">
        <router-outlet></router-outlet>
      </div>
    }

    @if (activeTab === 'settings') {
      <div class="settings-zone glass-card fade-in-tab">
        <h3>Update Profile Information</h3>
        <p class="section-subtitle">Modify your personal information details below.</p>
        
        <form (ngSubmit)="onUpdateProfile()" #settingsForm="ngForm">
          <div class="form-row">
            <div class="form-group">
              <label for="fName">First Name</label>
              <input 
                type="text" 
                id="fName" 
                name="firstName" 
                [(ngModel)]="firstName" 
                required
                placeholder="Enter new first name"
                class="profile-input"
              />
            </div>
            <div class="form-group">
              <label for="lName">Last Name</label>
              <input 
                type="text" 
                id="lName" 
                name="lastName" 
                [(ngModel)]="lastName" 
                required
                placeholder="Enter new last name"
                class="profile-input"
              />
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-save-profile" [disabled]="!settingsForm.valid || isSaving">
              Save Changes
            </button>
          </div>
        </form>
      </div>
    }

  </div>
</div>
