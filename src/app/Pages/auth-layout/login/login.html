<div class="page-wrapper">

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="auth-card">

    <a routerLink="/home" class="logo">
      <div class="logo-icon">⚡</div>
      DevPulse
    </a>

    <h1 class="card-title">Welcome back 👋</h1>
    <p class="card-subtitle">Sign in to continue reading</p>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="field-group">
        <label class="field-label">Username</label>
        <div class="input-wrapper">
          <i class="bi bi-at input-icon"></i>
          <input type="text" class="auth-input" placeholder="Enter your username"
            formControlName="username" autocomplete="username" />
        </div>
        <span class="error-message">{{ usernameValid.Message }}</span>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="input-wrapper">
          <i class="bi bi-lock input-icon"></i>
          <input [type]="showPassword ? 'text' : 'password'" class="auth-input"
            placeholder="Enter your password"
            formControlName="password" autocomplete="current-password" />
          <button type="button" class="toggle-password"
            (click)="togglePassword()" aria-label="Toggle password">
            <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
          </button>
        </div>
        <span class="error-message">{{ passwordValid.Message }}</span>
      </div>

      <button type="submit" class="btn-primary">
        Sign In 🔑
      </button>

      <div class="divider"><span>or</span></div>

      <p class="switch-link">
        Don't have an account?
        <a routerLink="/auth/register">Create one</a>
      </p>

    </form>

    <a routerLink="/home" class="back-home">
      <i class="bi bi-arrow-left"></i>
      Back to Home
    </a>

  </div>
</div>
