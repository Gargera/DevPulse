<div class="page-wrapper">

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="auth-card">

    <a routerLink="/home" class="logo">
      <div class="logo-icon">⚡</div>
      DevPulse
    </a>

    <h1 class="card-title">Create your account</h1>
    <p class="card-subtitle">Join thousands of tech readers today</p>

    <form class="auth-form" [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="field-row">

        <div class="field-group">
          <label class="field-label">First Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" class="auth-input" placeholder="First name"
              formControlName="firstName" autocomplete="given-name" />
          </div>
          <span class="error-message">{{ firstNameValid.Message }}</span>
        </div>

        <div class="field-group">
          <label class="field-label">Last Name</label>
          <div class="input-wrapper">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input type="text" class="auth-input" placeholder="Last name"
              formControlName="lastName" autocomplete="family-name" />
          </div>
          <span class="error-message">{{ lastNameValid.Message }}</span>
        </div>

      </div>

      <div class="field-group">
        <label class="field-label">Email Address</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
          <input type="email" class="auth-input" placeholder="you@example.com"
            formControlName="email" autocomplete="email" />
        </div>
        <span class="error-message">{{ emailValid.Message }}</span>
      </div>

      <div class="field-group">
        <label class="field-label">Username</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/>
            <path d="M6 20v-2a6 6 0 0 1 12 0v2"/>
          </svg>
          <input type="text" class="auth-input" placeholder="Choose a username"
            formControlName="username" autocomplete="username" />
        </div>
        <span class="error-message">{{ usernameValid.Message }}</span>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input [type]="showPassword ? 'text' : 'password'" class="auth-input" placeholder="Create a password"
            formControlName="password" autocomplete="new-password"
            (input)="updateStrength($event)" />
          <button type="button" class="toggle-password"
            (click)="togglePassword('password')" aria-label="Toggle password">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar">
          <div class="strength-seg" [class]="getSegClass(1)"></div>
          <div class="strength-seg" [class]="getSegClass(2)"></div>
          <div class="strength-seg" [class]="getSegClass(3)"></div>
          <div class="strength-seg" [class]="getSegClass(4)"></div>
        </div>
        <span class="error-message">{{ passwordValid.Message }}</span>
      </div>

      <div class="field-group">
        <label class="field-label">Confirm Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
          <input [type]="showConfirmPassword ? 'text' : 'password'" class="auth-input" placeholder="Repeat your password"
            formControlName="confirmPassword" autocomplete="new-password" />
          <button type="button" class="toggle-password"
            (click)="togglePassword('confirmPassword')" aria-label="Toggle confirm password">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="error-message">{{ confirmPasswordValid.Message }}</span>
      </div>

      <button type="submit" class="btn-primary">
        Create Account 🚀
      </button>

      <div class="divider"><span>or</span></div>

      <p class="switch-link">
        Already have an account?
        <a routerLink="/auth/login">Sign in</a>
      </p>

    </form>

    <a routerLink="/home" class="back-home">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to Home
    </a>

  </div>
</div>
