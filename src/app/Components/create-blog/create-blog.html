<div class="create-form" [formGroup]="blogForm">
  <div class="form-header">
    <div class="form-icon">✏️</div>
    <h2>Create New Blog</h2>
  </div>

  <div class="form-group">
    <label>Title</label>
    <input type="text" placeholder="Enter blog title" formControlName="Title" />
    <span class="error-message">{{titleValid.Message}}</span>
  </div>

  <div class="form-group">
    <label>Content</label>
    <textarea placeholder="Write your blog Content..." formControlName="Content"></textarea>
    <span class="error-message">{{contentValid.Message}}</span>
  </div>

  <div class="form-group">
    <label>Category</label>
    <select formControlName="Category">
      <option value="">Select Category</option>
      @for(category of categories; track category.id) {
        <option [value]="category.name">{{ category.name }}</option>
      }
    </select>
    <span class="error-message">{{categoryValid.Message}}</span>
  </div>

  <div class="form-group">
    <label>Image <span style="color:#b491d4; font-weight:400;">(Optional)</span></label>
    <div class="upload-box" (click)="imageInput.click()">
      <input #imageInput type="file" accept=".jpg,.jpeg,.png,.webp" hidden (change)="onImageSelected($event)" />
      <div class="upload-icon">☁️</div>
      <p>{{ selectedFileName || 'Choose a file' }}</p>
      <span>JPG, PNG or WEBP (max. 5MB)</span>
    </div>
    @if(imageError) {
      <span class="error-message">{{ imageError }}</span>
    }
    @if(imagePreview) {
      <img [src]="imagePreview" class="image-preview" alt="Preview" />
    }
  </div>

  <button class="btn-publish" (click)="createBlog()">🚀 Publish Blog</button>
</div>
