<footer>
  <div class="footer-top">

    <div class="footer-brand">
      <a routerLink="/home" class="logo">DevPulse</a>
      <p>Your daily source for the latest in technology, innovation, and digital trends from around the world.</p>
    </div>

    <div class="footer-col">
      <h4>Navigate</h4>
      <ul>
        <li><a routerLink="/home" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li><a routerLink="/about" routerLinkActive="active">About</a></li>
        <li><a routerLink="/blogs" routerLinkActive="active">Blogs</a></li>
        
        @if (isUserLoggedIn) {
          @if (isUserAdmin) {
            <li><a routerLink="/admin" routerLinkActive="active">Dashboard</a></li>
          } @else {
            <li><a routerLink="/profile" routerLinkActive="active">Profile</a></li>
          }
        }
      </ul>
    </div>

  </div>

  <div class="footer-bottom">
    <span>&copy; 2026 DevPulse. All rights reserved.</span>
  </div>
</footer>
