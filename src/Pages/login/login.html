<div class="page-wrapper">

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="auth-card">

    <a routerLink="/home" class="logo">
      <div class="logo-icon">⚡</div>
      DevPulse
    </a>

    <h1 class="card-title">Welcome back 👋</h1>
    <p class="card-subtitle">Sign in to continue reading</p>

    <form class="auth-form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="field-group">
        <label class="field-label">Username</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="8" r="4"/>
            <path d="M6 20v-2a6 6 0 0 1 12 0v2"/>
          </svg>
          <input type="text" class="auth-input" placeholder="Enter your username"
            formControlName="username" autocomplete="username" />
        </div>
        <span class="error-message">{{ usernameValid.Message }}</span>
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="input-wrapper">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
          <input [type]="showPassword ? 'text' : 'password'" class="auth-input"
            placeholder="Enter your password"
            formControlName="password" autocomplete="current-password" />
          <button type="button" class="toggle-password"
            (click)="togglePassword()" aria-label="Toggle password">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="error-message">{{ passwordValid.Message }}</span>
      </div>

      <button type="submit" class="btn-primary">
        Sign In 🔑
      </button>

      <div class="divider"><span>or</span></div>

      <p class="switch-link">
        Don't have an account?
        <a routerLink="/auth/register">Create one</a>
      </p>

    </form>

    <a routerLink="/home" class="back-home">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2.5">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to Home
    </a>

  </div>
</div>
